<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>竞赛管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; color: #333; }
    .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%); }
    .login-card { background: white; padding: 40px; border-radius: 16px; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-card h1 { text-align: center; margin-bottom: 8px; color: #1a237e; font-size: 22px; }
    .login-card .sub { text-align: center; color: #666; margin-bottom: 24px; font-size: 13px; }
    .login-card input { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 15px; margin-bottom: 16px; }
    .login-card input:focus { outline: none; border-color: #1a237e; }
    .login-card .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%); color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; }
    .login-card .error { color: #d32f2f; font-size: 13px; text-align: center; margin-top: 12px; }
    .login-page.hidden { display: none; }

    .admin-page { display: none; }
    .admin-page.active { display: block; }

    .topbar { background: #1a237e; color: white; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
    .topbar h2 { font-size: 18px; }
    .topbar .logout-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .topbar .user-badge { font-size: 13px; opacity: 0.8; }

    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .page-header h3 { font-size: 20px; }
    .add-btn { padding: 10px 20px; background: #1a237e; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .add-btn:hover { opacity: 0.9; }

    .bank-list { display: grid; gap: 12px; }
    .bank-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; }
    .bank-info h4 { font-size: 16px; margin-bottom: 4px; }
    .bank-info .meta { font-size: 13px; color: #888; }
    .bank-actions { display: flex; gap: 8px; align-items: center; }
    .bank-actions .btn-sm { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .btn-edit { background: #e3f2fd; color: #1565c0; }
    .btn-delete { background: #fce4ec; color: #c62828; }
    .btn-enable { background: #e8f5e9; color: #2e7d32; }
    .btn-disable { background: #fff3e0; color: #e65100; }
    .btn-manage { background: #f3e5f5; color: #6a1b9a; }
    .badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; margin-left: 8px; }
    .badge.active { background: #e8f5e9; color: #2e7d32; }
    .badge.inactive { background: #f5f5f5; color: #999; }

    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal-content { background: white; border-radius: 16px; padding: 28px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .modal-content h3 { margin-bottom: 20px; font-size: 18px; }
    .modal-content label { display: block; margin-bottom: 6px; color: #555; font-size: 13px; }
    .modal-content input[type="text"], .modal-content textarea, .modal-content select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .modal-content input:focus, .modal-content textarea:focus { outline: none; border-color: #1a237e; }
    .modal-content textarea { min-height: 60px; resize: vertical; }
    .modal-actions { display: flex; gap: 12px; margin-top: 16px; }
    .modal-actions .btn-primary { flex: 1; padding: 12px; background: #1a237e; color: white; border: none; border-radius: 8px; cursor: pointer; }
    .modal-actions .btn-cancel { flex: 1; padding: 12px; background: #f5f5f5; border: none; border-radius: 8px; cursor: pointer; }

    .question-table { width: 100%; border-collapse: collapse; }
    .question-table th { text-align: left; padding: 10px 12px; background: #f5f5f5; font-size: 13px; color: #666; }
    .question-table td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .question-table td.actions { white-space: nowrap; }
    .type-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
    .type-single { background: #e3f2fd; color: #1565c0; }
    .type-multi { background: #fce4ec; color: #c62828; }
    .type-judge { background: #e8f5e9; color: #2e7d32; }

    .back-link { display: inline-block; margin-bottom: 16px; color: #1a237e; cursor: pointer; font-size: 14px; }
    .back-link:hover { text-decoration: underline; }

    .option-input-group { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    .option-input-group input { flex: 1; }
    .option-input-group .del-opt { color: #c62828; cursor: pointer; font-size: 18px; padding: 4px; }
    .add-opt-btn { color: #1a237e; cursor: pointer; font-size: 13px; margin-bottom: 16px; display: inline-block; }

    .answer-hint { font-size: 12px; color: #888; margin-bottom: 12px; }
    .answer-options { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .answer-options label { display: flex; align-items: center; gap: 4px; font-size: 14px; cursor: pointer; }
    .answer-options input { width: auto; margin: 0; }

    .toast { position: fixed; top: 20px; right: 20px; background: #323232; color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 9999; animation: slideIn 0.3s ease; }
    .toast.success { background: #2e7d32; }
    .toast.error { background: #c62828; }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .empty-state { text-align: center; padding: 40px; color: #999; }
  </style>
</head>
<body>
  <!-- 登录页 -->
  <div class="login-page" id="loginPage">
    <div class="login-card">
      <h1>🔐 竞赛管理后台</h1>
      <p class="sub">请输入管理员账号密码</p>
      <input type="text" id="loginUser" placeholder="用户名" value="admin">
      <input type="password" id="loginPass" placeholder="密码" value="Zsjs@2026">
      <button class="btn" onclick="login()">登录</button>
      <div class="error" id="loginError"></div>
    </div>
  </div>

  <!-- 管理页 -->
  <div class="admin-page" id="adminPage">
    <div class="topbar">
      <div>
        <h2>🏆 竞赛管理后台</h2>
        <span class="user-badge">管理员</span>
      </div>
      <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>

    <!-- 题库列表 -->
    <div class="container" id="banksView">
      <div class="page-header">
        <h3>📚 题库管理</h3>
        <button class="add-btn" onclick="showAddBank()">+ 新建题库</button>
      </div>
      <div class="bank-list" id="bankList"></div>
    </div>

    <!-- 题目管理 -->
    <div class="container" id="questionsView" style="display:none;">
      <div class="back-link" onclick="showBanks()">← 返回题库列表</div>
      <div class="page-header">
        <h3 id="qBankTitle">题目管理</h3>
        <button class="add-btn" onclick="showAddQuestion()">+ 添加题目</button>
      </div>
      <table class="question-table" id="questionTable">
        <thead><tr><th style="width:50px">#</th><th>题型</th><th>题目</th><th>选项</th><th style="width:160px">操作</th></tr></thead>
        <tbody id="questionBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 模态框：题库 -->
  <div class="modal-overlay" id="bankModal">
    <div class="modal-content">
      <h3 id="bankModalTitle">新建题库</h3>
      <label>题库名称（同时也是竞赛名称）</label>
      <input type="text" id="bankNameInput" placeholder="请输入题库名称">
      <div class="modal-actions">
        <button class="btn-primary" onclick="saveBank()">保存</button>
        <button class="btn-cancel" onclick="closeModal('bankModal')">取消</button>
      </div>
    </div>
  </div>

  <!-- 模态框：题目 -->
  <div class="modal-overlay" id="questionModal">
    <div class="modal-content">
      <h3 id="qModalTitle">添加题目</h3>
      <label>题型</label>
      <select id="qTypeSelect" onchange="onTypeChange()">
        <option value="single">单选题</option>
        <option value="multi">多选题</option>
        <option value="judge">判断题</option>
      </select>
      <label>题目内容</label>
      <textarea id="qTextInput" placeholder="请输入题目内容"></textarea>
      <div id="optionsArea">
        <label>选项（每行一个）</label>
        <div id="optionInputs"></div>
        <span class="add-opt-btn" id="addOptBtn" onclick="addOption()">+ 添加选项</span>
      </div>
      <div id="answerArea">
        <div class="answer-hint" id="answerHint">请选择正确答案</div>
        <div class="answer-options" id="answerOptions"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-primary" onclick="saveQuestion()">保存</button>
        <button class="btn-cancel" onclick="closeModal('questionModal')">取消</button>
      </div>
    </div>
  </div>

  <script>
    let token = '';
    let currentBankId = null;
    let editingQuestionId = null;
    let editingBankId = null;

    // ============ 登录 ============
    function login() {
      const username = document.getElementById('loginUser').value.trim();
      const password = document.getElementById('loginPass').value.trim();
      fetch('/api/admin/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username, password })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          token = data.token;
          document.getElementById('loginPage').classList.add('hidden');
          document.getElementById('adminPage').classList.add('active');
          loadBanks();
        } else {
          document.getElementById('loginError').textContent = data.error || '登录失败';
        }
      })
      .catch(e => {
        document.getElementById('loginError').textContent = '网络错误';
      });
    }

    function logout() {
      token = '';
      document.getElementById('adminPage').classList.remove('active');
      document.getElementById('loginPage').classList.remove('hidden');
    }

    // ============ Toast ============
    function showToast(msg, type = 'success') {
      const t = document.createElement('div');
      t.className = 'toast ' + type;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    // ============ 模态框 ============
    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }

    function openModal(id) {
      document.getElementById(id).classList.add('active');
    }

    // ============ 题库管理 ============
    function loadBanks() {
      fetch('/api/admin/banks?token=' + token)
        .then(r => r.json())
        .then(data => {
          if (!data.success) { showToast(data.error, 'error'); return; }
          const list = document.getElementById('bankList');
          if (!data.banks || data.banks.length === 0) {
            list.innerHTML = '<div class="empty-state">暂无题库，点击右上角新建</div>';
            return;
          }
          list.innerHTML = data.banks.map(b => `
            <div class="bank-card">
              <div class="bank-info">
                <h4>${b.name} 
                  <span class="badge ${b.enabled ? 'active' : 'inactive'}">
                    ${b.enabled ? '✓ 已启用' : '未启用'}
                  </span>
                </h4>
                <div class="meta">${b.questionCount} 道题 · 最后更新 ${new Date(b.updatedAt).toLocaleString()}</div>
              </div>
              <div class="bank-actions">
                ${b.enabled 
                  ? `<button class="btn-sm btn-disable" onclick="toggleBank('${b.id}', false)">停用</button>`
                  : `<button class="btn-sm btn-enable" onclick="toggleBank('${b.id}', true)">启用</button>`
                }
                <button class="btn-sm btn-edit" onclick="showEditBank('${b.id}', '${b.name}')">重命名</button>
                <button class="btn-sm btn-manage" onclick="manageQuestions('${b.id}', '${b.name}')">管理题目</button>
                <button class="btn-sm btn-delete" onclick="deleteBank('${b.id}')">删除</button>
              </div>
            </div>
          `).join('');
        });
    }

    function showAddBank() {
      editingBankId = null;
      document.getElementById('bankModalTitle').textContent = '新建题库';
      document.getElementById('bankNameInput').value = '';
      openModal('bankModal');
    }

    function showEditBank(id, name) {
      editingBankId = id;
      document.getElementById('bankModalTitle').textContent = '重命名题库';
      document.getElementById('bankNameInput').value = name;
      openModal('bankModal');
    }

    function saveBank() {
      const name = document.getElementById('bankNameInput').value.trim();
      if (!name) { showToast('请输入题库名称', 'error'); return; }
      
      const url = editingBankId
        ? '/api/admin/banks/' + editingBankId + '?token=' + token
        : '/api/admin/banks?token=' + token;
      const method = editingBankId ? 'PUT' : 'POST';
      
      fetch(url, {
        method,
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ name })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          showToast(editingBankId ? '题库已更新' : '题库已创建');
          closeModal('bankModal');
          loadBanks();
        } else {
          showToast(data.error, 'error');
        }
      });
    }

    function toggleBank(id, enable) {
      fetch('/api/admin/banks/' + id + '?token=' + token, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ enabled: enable })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          showToast(enable ? '题库已启用，该题库名称将作为竞赛名称' : '题库已停用');
          loadBanks();
        } else {
          showToast(data.error, 'error');
        }
      });
    }

    function deleteBank(id) {
      if (!confirm('确定要删除这个题库吗？该操作不可恢复！')) return;
      fetch('/api/admin/banks/' + id + '?token=' + token, { method: 'DELETE' })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            showToast('题库已删除');
            loadBanks();
          } else {
            showToast(data.error, 'error');
          }
        });
    }

    // ============ 题目管理 ============
    function showBanks() {
      document.getElementById('questionsView').style.display = 'none';
      document.getElementById('banksView').style.display = 'block';
      currentBankId = null;
      loadBanks();
    }

    function manageQuestions(bankId, bankName) {
      currentBankId = bankId;
      document.getElementById('qBankTitle').textContent = '📝 ' + bankName + ' - 题目管理';
      document.getElementById('banksView').style.display = 'none';
      document.getElementById('questionsView').style.display = 'block';
      loadQuestions();
    }

    function loadQuestions() {
      if (!currentBankId) return;
      fetch('/api/admin/banks/' + currentBankId + '/questions?token=' + token)
        .then(r => r.json())
        .then(data => {
          if (!data.success) { showToast(data.error, 'error'); return; }
          const tbody = document.getElementById('questionBody');
          if (!data.questions || data.questions.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:30px;color:#999;">暂无题目，点击右上角添加</td></tr>';
            return;
          }
          tbody.innerHTML = data.questions.map((q, i) => {
            const typeLabel = { single: '单选', multi: '多选', judge: '判断' }[q.type] || q.type;
            const typeClass = { single: 'type-single', multi: 'type-multi', judge: 'type-judge' }[q.type] || '';
            const optText = q.type === 'judge' ? '对 / 错' : q.options.join(', ');
            return `
              <tr>
                <td>${i + 1}</td>
                <td><span class="type-badge ${typeClass}">${typeLabel}</span></td>
                <td>${q.q.length > 40 ? q.q.substring(0, 40) + '...' : q.q}</td>
                <td style="font-size:12px;color:#666;">${optText}</td>
                <td class="actions">
                  <button class="btn-sm btn-edit" onclick="editQuestion('${q.id}')">编辑</button>
                  <button class="btn-sm btn-delete" onclick="deleteQuestion('${q.id}')">删除</button>
                </td>
              </tr>
            `;
          }).join('');
        });
    }

    function showAddQuestion() {
      editingQuestionId = null;
      document.getElementById('qModalTitle').textContent = '添加题目';
      document.getElementById('qTypeSelect').value = 'single';
      document.getElementById('qTextInput').value = '';
      onTypeChange();
      openModal('questionModal');
    }

    function onTypeChange() {
      const type = document.getElementById('qTypeSelect').value;
      const optionsArea = document.getElementById('optionsArea');
      const container = document.getElementById('optionInputs');
      const addBtn = document.getElementById('addOptBtn');
      const answerArea = document.getElementById('answerArea');
      const hint = document.getElementById('answerHint');

      if (type === 'judge') {
        // 判断题：固定"对"/"错"
        optionsArea.style.display = 'none';
        hint.textContent = '请选择正确答案';
        document.getElementById('answerOptions').innerHTML = `
          <label><input type="radio" name="q_answer" value="0" checked> 对</label>
          <label><input type="radio" name="q_answer" value="1"> 错</label>
        `;
        answerArea.style.display = 'block';
      } else if (type === 'single') {
        optionsArea.style.display = 'block';
        if (container.children.length === 0) {
          container.innerHTML = getOptionInputs(4, ['A.', 'B.', 'C.', 'D.']);
        }
        addBtn.style.display = 'inline-block';
        hint.textContent = '请选择正确答案（单选题）';
        renderAnswerRadios();
        answerArea.style.display = 'block';
      } else {
        optionsArea.style.display = 'block';
        if (container.children.length === 0) {
          container.innerHTML = getOptionInputs(4, ['A.', 'B.', 'C.', 'D.']);
        }
        addBtn.style.display = 'inline-block';
        hint.textContent = '请选择所有正确答案（多选题可多选）';
        renderAnswerChecks();
        answerArea.style.display = 'block';
      }
    }

    function getOptionInputs(count, labels) {
      let html = '';
      for (let i = 0; i < count; i++) {
        const label = labels && labels[i] ? labels[i] : String.fromCharCode(65 + i) + '.';
        html += `<div class="option-input-group">
          <span>${label}</span>
          <input type="text" class="opt-input" placeholder="选项内容" value="">
          ${count > 2 ? '<span class="del-opt" onclick="removeOption(this)">×</span>' : ''}
        </div>`;
      }
      return html;
    }

    function addOption() {
      const container = document.getElementById('optionInputs');
      const count = container.children.length;
      const letter = String.fromCharCode(65 + count);
      container.innerHTML += `<div class="option-input-group">
        <span>${letter}.</span>
        <input type="text" class="opt-input" placeholder="选项内容" value="">
        <span class="del-opt" onclick="removeOption(this)">×</span>
      </div>`;
      // 刷新答案选择
      const type = document.getElementById('qTypeSelect').value;
      if (type === 'single') renderAnswerRadios();
      else renderAnswerChecks();
    }

    function removeOption(el) {
      const container = document.getElementById('optionInputs');
      if (container.children.length <= 2) return;
      el.parentElement.remove();
      // 重新编号
      const inputs = container.querySelectorAll('.option-input-group');
      inputs.forEach((group, i) => {
        group.querySelector('span:first-child').textContent = String.fromCharCode(65 + i) + '.';
      });
      const type = document.getElementById('qTypeSelect').value;
      if (type === 'single') renderAnswerRadios();
      else renderAnswerChecks();
    }

    function renderAnswerRadios() {
      const container = document.getElementById('optionInputs');
      const count = container.children.length;
      let html = '';
      for (let i = 0; i < count; i++) {
        const letter = String.fromCharCode(65 + i);
        html += `<label><input type="radio" name="q_answer" value="${i}" ${i === 0 ? 'checked' : ''}> ${letter}</label>`;
      }
      document.getElementById('answerOptions').innerHTML = html;
    }

    function renderAnswerChecks() {
      const container = document.getElementById('optionInputs');
      const count = container.children.length;
      let html = '';
      for (let i = 0; i < count; i++) {
        const letter = String.fromCharCode(65 + i);
        html += `<label><input type="checkbox" name="q_answer_cb" value="${i}" ${i === 0 ? 'checked' : ''}> ${letter}</label>`;
      }
      document.getElementById('answerOptions').innerHTML = html;
    }

    function getOptions() {
      const type = document.getElementById('qTypeSelect').value;
      if (type === 'judge') return ['对', '错'];
      
      const inputs = document.querySelectorAll('.opt-input');
      const opts = [];
      inputs.forEach(inp => {
        const val = inp.value.trim();
        if (val) opts.push(val);
      });
      return opts;
    }

    function getAnswer(type) {
      if (type === 'judge' || type === 'single') {
        const selected = document.querySelector('input[name="q_answer"]:checked');
        return selected ? parseInt(selected.value) : 0;
      } else {
        const checks = document.querySelectorAll('input[name="q_answer_cb"]:checked');
        return Array.from(checks).map(c => parseInt(c.value));
      }
    }

    function saveQuestion() {
      const type = document.getElementById('qTypeSelect').value;
      const qText = document.getElementById('qTextInput').value.trim();
      if (!qText) { showToast('请输入题目内容', 'error'); return; }
      
      const options = getOptions();
      if (type !== 'judge' && options.length < 2) {
        showToast('至少需要2个选项', 'error');
        return;
      }
      
      const answer = getAnswer(type);
      if (!answer && answer !== 0) { showToast('请选择正确答案', 'error'); return; }

      const url = editingQuestionId
        ? '/api/admin/questions/' + editingQuestionId + '?token=' + token
        : '/api/admin/banks/' + currentBankId + '/questions?token=' + token;
      const method = editingQuestionId ? 'PUT' : 'POST';

      const body = { type, q: qText, options, answer };

      fetch(url, {
        method,
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          showToast(editingQuestionId ? '题目已更新' : '题目已添加');
          closeModal('questionModal');
          loadQuestions();
        } else {
          showToast(data.error, 'error');
        }
      });
    }

    function editQuestion(qId) {
      // 从当前题库获取该题数据
      fetch('/api/admin/banks/' + currentBankId + '?token=' + token)
        .then(r => r.json())
        .then(data => {
          if (!data.success) { showToast(data.error, 'error'); return; }
          const q = data.bank.questions.find(x => x.id === qId);
          if (!q) { showToast('题目不存在', 'error'); return; }
          
          editingQuestionId = qId;
          document.getElementById('qModalTitle').textContent = '编辑题目';
          document.getElementById('qTypeSelect').value = q.type;
          document.getElementById('qTextInput').value = q.q;
          
          // 设置选项
          const container = document.getElementById('optionInputs');
          if (q.type === 'judge') {
            document.getElementById('optionsArea').style.display = 'none';
          } else {
            document.getElementById('optionsArea').style.display = 'block';
            container.innerHTML = q.options.map((opt, i) => {
              const letter = String.fromCharCode(65 + i);
              return `<div class="option-input-group">
                <span>${letter}.</span>
                <input type="text" class="opt-input" placeholder="选项内容" value="${opt}">
                ${q.options.length > 2 ? '<span class="del-opt" onclick="removeOption(this)">×</span>' : ''}
              </div>`;
            }).join('');
          }
          
          // 设置答案
          setTimeout(() => {
            const type = q.type;
            if (type === 'judge' || type === 'single') {
              const answerArea = document.getElementById('answerOptions');
              if (type === 'judge') {
                answerArea.innerHTML = `
                  <label><input type="radio" name="q_answer" value="0" ${q.answer === 0 ? 'checked' : ''}> 对</label>
                  <label><input type="radio" name="q_answer" value="1" ${q.answer === 1 ? 'checked' : ''}> 错</label>
                `;
              } else {
                renderAnswerRadios();
                const radios = document.querySelectorAll('input[name="q_answer"]');
                radios.forEach(r => r.checked = parseInt(r.value) === q.answer);
              }
            } else {
              renderAnswerChecks();
              const checks = document.querySelectorAll('input[name="q_answer_cb"]');
              const ans = q.answer || [];
              checks.forEach(c => c.checked = ans.includes(parseInt(c.value)));
            }
          }, 50);
          
          openModal('questionModal');
        });
    }

    function deleteQuestion(qId) {
      if (!confirm('确定删除这道题吗？')) return;
      fetch('/api/admin/questions/' + qId + '?token=' + token, { method: 'DELETE' })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            showToast('题目已删除');
            loadQuestions();
          } else {
            showToast(data.error, 'error');
          }
        });
    }

    // ============ 键盘快捷键 ============
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
      }
    });
  </script>
</body>
</html>
