<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>竞赛系统 - 排名</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 500px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { color: white; font-size: 28px; margin-bottom: 8px; }
    .header p { color: rgba(255,255,255,0.8); }
    .refresh-btn { padding: 8px 16px; background: rgba(255,255,255,0.2); color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 14px; margin-top: 12px; }
    .ranking-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .ranking-header { background: linear-gradient(135deg, #ffd700, #ffaa00); padding: 16px; display: flex; align-items: center; gap: 12px; }
    .ranking-title { font-size: 18px; font-weight: bold; color: #333; }
    .ranking-subtitle { font-size: 13px; color: #666; }
    .ranking-list { padding: 16px; }
    .ranking-item { display: flex; align-items: center; padding: 14px; border-radius: 12px; margin-bottom: 8px; background: #f8f9fa; }
    .ranking-item.top3 { background: linear-gradient(135deg, #f0f0f0, #e8e8e8); }
    .ranking-item.gold { background: linear-gradient(135deg, #fff8e0, #ffecb3); border: 2px solid #ffd700; }
    .ranking-item.silver { background: linear-gradient(135deg, #f5f5f5, #e0e0e0); border: 2px solid #c0c0c0; }
    .ranking-item.bronze { background: linear-gradient(135deg, #fff5ec, #ffe0d0); border: 2px solid #cd7f32; }
    .rank-num { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; margin-right: 12px; }
    .rank-1 { background: #ffd700; color: white; border-radius: 50%; }
    .rank-2 { background: #c0c0c0; color: white; border-radius: 50%; }
    .rank-3 { background: #cd7f32; color: white; border-radius: 50%; }
    .rank-other { background: #e0e0e0; color: #666; border-radius: 8px; }
    .player-info { flex: 1; }
    .player-name { font-weight: 600; font-size: 16px; }
    .player-detail { font-size: 12px; color: #666; }
    .player-score { text-align: right; }
    .score-text { font-size: 22px; font-weight: bold; color: #667eea; }
    .score-label { font-size: 11px; color: #999; }
    .time-text { font-size: 12px; color: #666; }
    .empty { text-align: center; padding: 40px; color: #999; }
    .loading { text-align: center; padding: 40px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .btn { display: block; width: 100%; padding: 16px; background: #667eea; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 16px; }
    .btn-secondary { background: #f0f0f0; color: #333; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏆 最终排名</h1>
      <p>按分数降序、用时升序排列</p>
      <button class="refresh-btn" onclick="loadRanking()">🔄 刷新</button>
    </div>
    
    <div class="ranking-card">
      <div class="ranking-header">
        <div class="ranking-title">🏅 排行榜</div>
      </div>
      <div class="ranking-list" id="rankingList">
        <div class="loading">
          <div class="spinner"></div>
          <p>加载中...</p>
        </div>
      </div>
    </div>
    
    <button class="btn btn-secondary" onclick="window.location.href='/'">返回首页</button>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room');
    
    let autoRefresh = true;
    
    async function loadRanking() {
      if (!roomId) {
        alert('无效的房间');
        window.location.href = '/';
        return;
      }
      
      try {
        const res = await fetch('/api/room/' + roomId);
        const data = await res.json();
        
        if (!data.success) {
          document.getElementById('rankingList').innerHTML = `
            <p style="color: red; text-align: center;">${data.error || '加载失败'}</p>
          `;
          return;
        }
        
        const room = data.room;
        
        if (!room.players || room.players.length === 0) {
          document.getElementById('rankingList').innerHTML = `
            <p class="empty">暂无参赛者</p>
          `;
          return;
        }
        
        // 排序：分数降序，用时升序
        const sorted = [...room.players].sort((a, b) => {
          if (b.score !== a.score) return b.score - a.score;
          return (a.finishTime || 99999999999) - (b.finishTime || 99999999999);
        });
        
        const list = document.getElementById('rankingList');
        list.innerHTML = sorted.map((p, i) => {
          const rank = i + 1;
          const timeUsed = p.finishTime && room.startTime ? 
            Math.floor((p.finishTime - room.startTime) / 1000) : null;
          const timeStr = formatTime(timeUsed);
          
          let rankClass = '';
          let medal = rank;
          if (rank === 1) { rankClass = 'top3 gold'; }
          else if (rank === 2) { rankClass = 'top3 silver'; }
          else if (rank === 3) { rankClass = 'top3 bronze'; }
          
          return `
            <div class="ranking-item ${rankClass}">
              <div class="rank-num ${rank <= 3 ? 'rank-' + rank : 'rank-other'}">${medal}</div>
              <div class="player-info">
                <div class="player-name">${p.nickname}</div>
                <div class="player-detail">${p.finished ? '已完成' : '进行中'}</div>
              </div>
              <div class="player-score">
                <div class="score-text">${p.score}</div>
                <div class="score-label">分</div>
                <div class="time-text">${timeStr}</div>
              </div>
            </div>
          `;
        }).join('');
        
        // 比赛结束后停止自动刷新
        if (room.status === 'finished') {
          autoRefresh = false;
        }
        
        // 如果比赛还在进行中，继续轮询
        if (autoRefresh && room.status !== 'finished') {
          setTimeout(loadRanking, 3000);
        }
        
      } catch(e) {
        document.getElementById('rankingList').innerHTML = `
          <p style="color: red; text-align: center;">网络错误</p>
        `;
      }
    }
    
    function formatTime(seconds) {
      if (!seconds) return '--';
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      if (mins > 0) {
        return `${mins}分${secs}秒`;
      }
      return `${secs}秒`;
    }
    
    loadRanking();
  </script>
</body>
</html>
