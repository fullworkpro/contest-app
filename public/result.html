<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>竞赛系统 - 个人成绩</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { background: white; border-radius: 20px; padding: 32px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
    .trophy { font-size: 80px; margin-bottom: 16px; }
    .title { font-size: 24px; color: #333; margin-bottom: 24px; }
    .score-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 16px; padding: 32px; color: white; margin-bottom: 24px; }
    .score-value { font-size: 64px; font-weight: bold; }
    .score-label { font-size: 16px; opacity: 0.9; }
    .score-full { font-size: 14px; opacity: 0.8; margin-top: 8px; }
    .stats { display: flex; justify-content: space-around; margin-bottom: 24px; }
    .stat-item { text-align: center; }
    .stat-value { font-size: 24px; font-weight: bold; color: #333; }
    .stat-label { font-size: 12px; color: #666; }
    .rank-display { background: linear-gradient(135deg, #ffd700, #ffaa00); border-radius: 12px; padding: 20px; margin-bottom: 24px; }
    .rank-label { font-size: 14px; color: #333; }
    .rank-value { font-size: 48px; font-weight: bold; color: #333; }
    .btn { width: 100%; padding: 16px; background: #667eea; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 12px; }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .tips { margin-top: 20px; padding: 16px; background: #f8f9fa; border-radius: 10px; font-size: 13px; color: #666; }
    .loading { text-align: center; padding: 40px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container" id="resultContainer">
    <div class="loading">
      <div class="spinner"></div>
      <p>加载成绩中...</p>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room');
    const token = urlParams.get('token');
    
    let polling = true;
    
    async function loadResult() {
      if (!roomId || !token) {
        alert('无效的访问');
        window.location.href = '/';
        return;
      }
      
      try {
        const res = await fetch('/api/result/' + roomId + '/' + token);
        const data = await res.json();
        
        if (!data.success) {
          document.getElementById('resultContainer').innerHTML = `
            <p style="color: red; text-align: center;">${data.error || '加载失败'}</p>
            <button class="btn btn-secondary" onclick="window.location.href='/'">返回首页</button>
          `;
          return;
        }
        
        const result = data.result;
        const timeUsed = formatTime(result.timeUsed);
        
        // 获取奖杯emoji
        const trophy = result.rank === 1 ? '🥇' : result.rank === 2 ? '🥈' : result.rank === 3 ? '🥉' : '🏅';
        
        document.getElementById('resultContainer').innerHTML = `
          <div class="trophy">${trophy}</div>
          <div class="title">${result.nickname}</div>
          
          <div class="score-card">
            <div class="score-value">${result.score}</div>
            <div class="score-label">得分</div>
            <div class="score-full">满分 ${result.totalScore}</div>
          </div>
          
          <div class="stats">
            <div class="stat-item">
              <div class="stat-value">${result.rank || '-'}</div>
              <div class="stat-label">排名</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">${result.totalPlayers || '-'}</div>
              <div class="stat-label">参赛人数</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">${timeUsed}</div>
              <div class="stat-label">用时</div>
            </div>
          </div>
          
          ${result.finished ? '' : '<div class="rank-display"><div class="rank-label">比赛进行中...</div></div>'}
          
          <button class="btn" onclick="viewRanking()">📊 查看排名</button>
          <button class="btn btn-secondary" onclick="window.location.href='/'">返回首页</button>
        `);
        
        // 如果比赛还在进行中，继续轮询
        if (!result.finished && polling) {
          polling = false;
          let countdown = 5;
          const interval = setInterval(() => {
            countdown--;
            if (countdown <= 0 || !polling) {
              clearInterval(interval);
              return;
            }
            loadResult();
          }, 3000);
        }
        
      } catch(e) {
        document.getElementById('resultContainer').innerHTML = `
          <p style="color: red; text-align: center;">网络错误</p>
          <button class="btn btn-secondary" onclick="window.location.href='/'">返回首页</button>
        `;
      }
    }
    
    function formatTime(seconds) {
      if (!seconds) return '--:--';
      const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
      const secs = (seconds % 60).toString().padStart(2, '0');
      return `${mins}:${secs}`;
    }
    
    function viewRanking() {
      window.location.href = '/ranking.html?room=' + roomId;
    }
    
    loadResult();
  </script>
</body>
</html>
